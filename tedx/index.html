<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEDxTNS Youth</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow-x: hidden;
}

.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
  background: url("../tedx-banner.webp") center/cover no-repeat;
}

/* Tablet */
@media (max-width: 992px) {
  .hero {
    background: url("../tedxall.png") center/cover no-repeat;
  }
}

/* Mobile */
@media (max-width: 576px) {
  .hero {
    background: url("../tedxall.png") center/cover no-repeat;
  }
}

/* overlay */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1;
}

/* content */
.hero-content {
  position: absolute;
  inset: 0;
  z-index: 2;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
/* first screen */
.top-layer {
  z-index: 2;
}

/* second screen starts below */
.next-layer {
  z-index: 1;
  transform: translateY(100%);
}

/* text */
#main-text {
  font-size: clamp(2.5rem, 6vw, 5.5rem);
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 30px red;
}

#sub-text {
  font-size: clamp(2.5rem, 4vw, 4.5rem);
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 30px red;
}

/* next section */
.details-section {
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<section class="hero">

  <!-- TOP CONTENT -->
  <div class="hero-content top-layer">
    <h1 id="main-text"></h1>
    <p id="sub-text"></p>
  </div>

  <!-- NEXT CONTENT -->
  <div class="hero-content next-layer">
    <h2>Event Details</h2>
    <p>July 24, 2026 | 9AM - 3PM</p>
  </div>

</section>

<!-- NEXT -->
<section class="details-section">
  <h2>Next Content Appears Smoothly 🚀</h2>
</section>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

/* TYPEWRITER */
const main = "TEDxTNS Youth";
const sub = "Edge of Becoming";

let i = 0, j = 0;

function typeMain() {
  if (i < main.length) {
    document.getElementById("main-text").innerHTML += main.charAt(i);
    i++;
    setTimeout(typeMain, 50);
  } else {
    setTimeout(typeSub, 300);
  }
}

function typeSub() {
  if (j < sub.length) {
    document.getElementById("sub-text").innerHTML += sub.charAt(j);
    j++;
    setTimeout(typeSub, 40);
  }
}

typeMain();

let tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "+=200%",
    scrub: true,
    pin: true
  }
});

/* move first content up */
tl.to(".top-layer", {
  y: "-100%",
  ease: "none"
}, 0)

/* bring next content from below */
.to(".next-layer", {
  y: "0%",
  ease: "none"
}, 0);

/* MAIN ANIMATION */
tl.to(".hero-content", {
  y: "-60%",   // reduced movement
  ease: "none"
})

.to("#main-text", {
  y: -100,
  opacity: 0.3   // not fully hidden
}, 0)

.to("#sub-text", {
  y: -50,
  opacity: 0.4
}, 0);
</script>

</body>
</html>
